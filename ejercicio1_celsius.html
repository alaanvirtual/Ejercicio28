<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ejercicio 1 - Celsius a Fahrenheit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    .badge {
      display: inline-block;
      background: #e6f1fb;
      color: #185fa5;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    h1 { font-size: 1.3rem; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    p { font-size: 13px; color: #777; margin-bottom: 1.5rem; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      font-size: 15px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; outline: none;
      transition: border-color 0.2s;
      color: #1a1a2e;
    }
    input:focus { border-color: #378add; }
    button {
      margin-top: 16px; width: 100%;
      padding: 11px; font-size: 15px; font-weight: 600;
      background: #185fa5; color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #1474c4; }
    button:active { transform: scale(0.98); }
    .result {
      margin-top: 16px; padding: 14px 16px;
      background: #f0f7ff; border-left: 4px solid #378add;
      border-radius: 8px; font-size: 15px;
      font-weight: 600; color: #185fa5;
      display: none;
    }
    .formula {
      margin-top: 12px; font-size: 12px;
      color: #999; text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Ejercicio 1</span>
    <h1>Celsius → Fahrenheit</h1>
    <p>Convierte una temperatura de grados Celsius a Fahrenheit.</p>
    <label for="celsius">Temperatura en Celsius</label>
    <input type="number" id="celsius" placeholder="Ej: 25" step="any" />
    <button onclick="convertir()">Convertir</button>
    <div class="result" id="resultado"></div>
    <p class="formula">Fórmula: F = C × 9/5 + 32</p>
  </div>

  <script>
    function convertir() {
      const c = parseFloat(document.getElementById('celsius').value);
      const res = document.getElementById('resultado');
      if (isNaN(c)) {
        res.style.display = 'block';
        res.style.borderColor = '#e24b4a';
        res.style.color = '#a32d2d';
        res.style.background = '#fcebeb';
        res.textContent = 'Por favor ingresa un número válido.';
        return;
      }
      const f = (c * 9 / 5 + 32).toFixed(1);
      res.style.display = 'block';
      res.style.borderColor = '#378add';
      res.style.color = '#185fa5';
      res.style.background = '#f0f7ff';
      res.textContent = `${c} Celsius = ${f} Fahrenheit`;
    }

    document.getElementById('celsius').addEventListener('keydown', e => {
      if (e.key === 'Enter') convertir();
    });
  </script>
</body>
</html>
